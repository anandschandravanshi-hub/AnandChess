<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anand Chess</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/board.css">
<link rel="stylesheet" href="css/pieces.css">
<link rel="stylesheet" href="css/controls.css">
<link rel="stylesheet" href="css/history.css">
<link rel="stylesheet" href="css/status.css">
<link rel="stylesheet" href="css/modal.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Game Modal -->

    <div id="game-modal" class="hidden">

        <div class="modal-content">

            <h2 id="modal-title"></h2>

            <p id="modal-message"></p>

            <button id="modal-new-game-btn">
                New Game
            </button>

        </div>

    </div>

    <!-- Main Container -->

    <div class="container">

        <!-- LEFT PANEL -->

        <div id="left-panel">

            <!-- Logo -->

            <div class="panel logo-panel">

                <div class="logo-title">

                    <span class="logo-icon">👑</span>

                    <span class="logo-name">
                        ANAND CHESS
                    </span>

                </div>

            </div>

            <!-- Captured Pieces -->

            <div class="panel" id="captured-panel">

                <h3>Captured Pieces</h3>

                <div class="captured-section">

                    <p>Black Captured</p>

                    <div id="captured-black"></div>

                </div>

                <div class="captured-section">

                    <p>White Captured</p>

                    <div id="captured-white"></div>

                </div>

            </div>

            <!-- Game Controls -->

            <div class="panel" id="controls-panel">

                <h3>Game Controls</h3>

                <button id="new-game-btn" class="control-btn">
                    ➕ New Game
                </button>

                <button id="undo-btn" class="control-btn">
                    ↩ Undo Move
                </button>

                <button id="flip-btn" class="control-btn">
                    🔄 Flip Board
                </button>

                <button id="settings-btn" class="control-btn">
                    ⚙ Settings
                </button>

            </div>

        </div>

        <!-- CENTER -->

        <div class="game">

    <div class="board-frame">

        <span class="corner top-left"></span>
        <span class="corner top-right"></span>
        <span class="corner bottom-left"></span>
        <span class="corner bottom-right"></span>

        <div id="chessboard"></div>

    </div>

    <div id="status-bar">

        <div id="turn-status">

            <div class="status-title">
                ⚪ White to Move
            </div>

            <div class="status-subtitle">
                You are playing as White
            </div>

        </div>

        <div id="move-count">

            <div class="status-title">
                📅 Move: 1
            </div>

            <div class="status-subtitle">
                Half Move: 0
            </div>

        </div>

        <div id="game-status">

            <div class="status-title">
                🛡 Status: Normal
            </div>

            <div class="status-subtitle">
                The game is in progress
            </div>

        </div>

    </div>

</div>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div id="history" class="panel">

            <h3>Move History</h3>

            <div class="history-tabs">

                <button id="moves-tab" class="tab active">
                  Moves
                </button>

                <button id="analysis-tab" class="tab">
                  Analysis
                </button>

</div>

<div id="moves"></div>
<div class="history-controls">

    <button id="first-move-btn">⏮</button>

    <button id="prev-move-btn">◀</button>

    <button id="next-move-btn">▶</button>

    <button id="last-move-btn">⏭</button>

</div>

        </div>

    </div>
    <script src="js/board.js"></script>
<script src="js/utils.js"></script>

<script src="js/pieces.js"></script>
<script src="js/moves.js"></script>
<script src="js/rules.js"></script>

<script src="js/history.js"></script>
<script src="js/ui.js"></script>
<script src="js/controls.js"></script>
<script src="js/main.js"></script>
</body>

</html>
